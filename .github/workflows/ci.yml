name: CI

on:
  push:
    branches: [v6, master]
  pull_request:
    branches: [v6, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint CSS
        run: npx stylelint "src/css/**/*.css"

      - name: Build
        run: npm run build

      - name: Validate HTML
        run: npx html-validate "src/**/*.html"

      - name: Verify dist output
        run: |
          test -f dist/css/bullframe.css || (echo "Missing bullframe.css" && exit 1)
          test -f dist/css/bullframe.min.css || (echo "Missing bullframe.min.css" && exit 1)
          test -f dist/css/bullframe-dark.css || (echo "Missing bullframe-dark.css" && exit 1)
          test -f dist/css/bullframe-classless.css || (echo "Missing bullframe-classless.css" && exit 1)
          test -f dist/css/bullframe-modern.css || (echo "Missing bullframe-modern.css" && exit 1)
          echo "All expected dist files present"

  playwright:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install website dependencies
        run: npm ci
        working-directory: website

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build (vite + sync-demo + docusaurus)
        run: npm run docs:build

      - name: Run visual tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
