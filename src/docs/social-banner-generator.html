<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bullframe CSS Social Banner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a1a;
      padding: 2rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .banner {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #f95c1f 0%, #e0541c 50%, #c74a18 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 4rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    /* Subtle pattern overlay */
    .banner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255, 255, 255, 0.03) 35px, rgba(255, 255, 255, 0.03) 70px);
      pointer-events: none;
    }
    
    .left-section {
      flex: 1;
      z-index: 1;
      padding-right: 3rem;
    }
    
    .right-section {
      flex: 0 0 400px;
      z-index: 1;
    }
    
    .title {
      font-size: 90px;
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1;
      margin-bottom: 1rem;
      letter-spacing: -2px;
    }
    
    .version-badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      padding: 0.5rem 1.5rem;
      border-radius: 8px;
      font-size: 28px;
      font-weight: 600;
      color: #FFFFFF;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    .tagline {
      font-size: 36px;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 300;
      line-height: 1.3;
    }
    
    .features-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    
    .feature-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #FFFFFF;
      font-size: 22px;
      font-weight: 500;
    }
    
    .checkmark {
      width: 28px;
      height: 28px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }
    
    /* Decorative elements */
    .banner::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    
    .code-icon {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
      opacity: 0.1;
      font-size: 120px;
      color: white;
      font-family: 'Courier New', monospace;
    }
    
    @media print {
      body {
        background: white;
      }
      .banner {
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="left-section">
      <h1 class="title">Bullframe CSS</h1>
      <span class="version-badge">v6</span>
      <p class="tagline">The Lightweight CSS Framework</p>
    </div>
    
    <div class="right-section">
      <div class="features-grid">
        <div class="feature-item">
          <span class="checkmark">✓</span>
          <span>Native CSS</span>
        </div>
        <div class="feature-item">
          <span class="checkmark">✓</span>
          <span>~8KB gzipped</span>
        </div>
        <div class="feature-item">
          <span class="checkmark">✓</span>
          <span>WCAG AA</span>
        </div>
        <div class="feature-item">
          <span class="checkmark">✓</span>
          <span>PostCSS</span>
        </div>
      </div>
    </div>
    
    <div class="code-icon">{ }</div>
  </div>
  
  <script>
    // Instructions for screenshot
    console.log('%c📸 Screenshot Instructions:', 'font-size: 16px; font-weight: bold;');
    console.log('1. Open browser DevTools (F12)');
    console.log('2. Use device toolbar (Ctrl+Shift+M)');
    console.log('3. Set custom size: 1200x630');
    console.log('4. Right-click banner → Inspect → Screenshot node');
    console.log('5. Or use browser screenshot extension');
    console.log('');
    console.log('Alternative: Use Canva Dream Lab or Microsoft Designer with the prompts in SOCIAL_BANNER_SPEC.md');
  </script>
</body>
</html>
